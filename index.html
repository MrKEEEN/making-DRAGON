<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dragon倶楽部</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="canvas-container">
    <canvas id="canvas-webgpu"></canvas>
    <canvas id="canvas-2d"></canvas>
    <button id="btn-r-color" class="touch-button" class="color-button">R</button>
    <button id="btn-g-color" class="touch-button" class="color-button">G</button>
    <button id="btn-b-color" class="touch-button" class="color-button">B</button>
    <button id="btn-multiply" class="touch-button">*</button>
    <button id="btn-divide" class="touch-button">÷</button>
    <button id="btn-add" class="touch-button">+</button>
    <button id="btn-subtract" class="touch-button">-</button>
    <button id="btn-rotation" class="touch-button">1-4</button>
    <button id="btn-reverse" class="touch-button">z</button>
    <button id="btn-mouse-off" class="touch-button">m</button>
    <button id="btn-clear-off" class="touch-button">c</button>
    <button id="btn-write" class="touch-button">w</button>
    <button id="btn-fullscreen" class="touch-button">FULL SC.</button>
    <button id="btn-hide-ui" class="touch-button">UI OFF</button>
    <button id="btn-zoomup" class="touch-button">Z↑</button>
    <button id="btn-zoomdown" class="touch-button">Z↓</button>
    <!-- <div id="debug" style="position:fixed; top:10px; left:10px; z-index:100; color:white; background:rgba(0,0,0,0.5); pointer-events:none; font-family:monospace;"></div> -->
</div>
<div id="statusInfo">
  <div id="mode-info">MODE - Rotation(1~4):0 Reverse(z):0 MouseOff(m):0 ClearOff(c):0 Write(w):0</div>
  <div id="RGB-info">R:0 G:0 B:0</div>
  <div id="ratio-info">Ratio:</div>
</div>
<div id="resizer_v"></div>
<div id="controls">
  <div id="inspector-top-container">
    <div id="manual-display"></div>
  </div>
  <div id="splitResizer"></div>
  <div id="dragonInputWrapper">
    <div id="dragonInputLabel">New Dragon Part Name</div>
    <input type="text" id="dragonInput" placeholder="Enter new name">
    <button id="updateAddBtn">【PART】update/add</button>
    <button id="reset-btn">Reset</button>
    <button id="save-btn">Save</button>
    <a id="master-save-link" style="display:none;"></a>
    <a id="dragon-save-link" style="display:none;"></a>
    <button id="load-btn">Load</button>
    <input type="file" id="json-loader" accept=".json" style="display:none;">
    <button id="del-btn">DELETE PART</button>
  </div>
<div id="ui-switch-wrapper">
  <button id="prev-ui-switch" class="ui-switch">←PREV</button>
  <div id="current-ui-display">1 / 1</div>
  <button id="next-ui-switch" class="ui-switch">NEXT→</button>
  <button id="add-ui-display" class="ui-switch">ADD</button>
  <button id="del-ui-display" class="ui-switch">DEL</button>
</div>
  <div id="inspector-content"></div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
